<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Affiliate Otomatis</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0f172a;
  color: white;
}

section {
  padding: 80px 20px;
  text-align: center;
}

/* HERO */
.hero {
  background: linear-gradient(135deg, #1e293b, #0f172a);
}

.hero h1 {
  font-size: 32px;
  margin-bottom: 15px;
}

.hero p {
  opacity: 0.8;
  margin-bottom: 20px;
}

.btn {
  padding: 15px 30px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

/* CARD */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #1e293b;
  margin: 10px;
  padding: 20px;
  border-radius: 12px;
  width: 250px;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  display: none;
}

/* NOTIF */
.fake {
  position: fixed;
  top: 20px;
  left: 20px;
  background: #22c55e;
  padding: 10px 15px;
  border-radius: 8px;
  font-size: 12px;
  display: none;
}

/* TRACKING */
.counter {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Link Kerja Sendiri, Kamu Tinggal Nikmatin</h1>
  <p>Sistem otomatis untuk hasilin dari affiliate</p>
  <button class="btn" onclick="goAffiliate()">Mulai Sekarang</button>
  <div class="counter" id="clickCount">Total Klik: 0</div>
</section>

<!-- PROBLEM -->
<section>
  <h2>Masalah Umum</h2>
  <div class="grid">
    <div class="card">Capek promosi</div>
    <div class="card">Sepi klik</div>
    <div class="card">Gak ngerti mulai</div>
  </div>
</section>

<!-- PRODUK -->
<section>
  <h2>Pilih Produk</h2>
  <div class="grid" id="productList"></div>
</section>

<!-- CTA -->
<section>
  <h2>Mulai Sekarang</h2>
  <button class="btn" onclick="goAffiliate()">Aktifkan Sistem</button>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  <p>🔥 Diskon hari ini!</p>
  <button class="btn" onclick="goAffiliate()">Klik Disini</button>
</div>

<!-- FAKE -->
<div class="fake" id="fakeNotif"></div>

<script>
// MULTI PRODUK
const products = [
  {name: "Produk 1", link: "https://affiliate1.com"},
  {name: "Produk 2", link: "https://affiliate2.com"},
  {name: "Produk 3", link: "https://affiliate3.com"}
];

// render produk
const productList = document.getElementById("productList");
products.forEach(p => {
  let el = document.createElement("div");
  el.className = "card";
  el.innerHTML = `
    <h3>${p.name}</h3>
    <button class="btn" onclick="goProduct('${p.link}')">Lihat</button>
  `;
  productList.appendChild(el);
});

// tracking klik
let clicks = localStorage.getItem("clicks") || 0;
document.getElementById("clickCount").innerText = "Total Klik: " + clicks;

function trackClick() {
  clicks++;
  localStorage.setItem("clicks", clicks);
  document.getElementById("clickCount").innerText = "Total Klik: " + clicks;
}

// redirect default
function goAffiliate() {
  trackClick();
  window.location.href = products[0].link;
}

// redirect produk
function trackClick() {
  fetch("http://localhost:3000/track", {
    method: "POST"
  });
}

// popup delay
setTimeout(() => {
  document.getElementById("popup").style.display = "block";
}, 4000);

// fake notif realistis
const names = ["Andi", "Rina", "Budi", "Sari", "Dika"];
setInterval(() => {
  let notif = document.getElementById("fakeNotif");
  let name = names[Math.floor(Math.random() * names.length)];
  notif.innerText = name + " baru saja beli!";
  notif.style.display = "block";

  setTimeout(() => notif.style.display = "none", 3000);
}, 7000);
</script>

</body>
</html>
